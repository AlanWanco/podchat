<!DOCTYPE html>
<html lang="en">
<head>
<style>
  body, html { margin: 0; height: 100%; display: flex; flex-direction: column; }
  .parent { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; }
  .container { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; min-width: 0; min-height: 0; padding: 32px; background: #eee; }
  .child { flex-shrink: 0; background: red; transition: all 0.1s; }
</style>
</head>
<body>
  <div class="parent">
    <div class="container" id="container">
      <div class="child" id="child"></div>
    </div>
  </div>
  <script>
    const container = document.getElementById('container');
    const child = document.getElementById('child');
    const TARGET_W = 1920;
    const TARGET_H = 1080;
    
    const ro = new ResizeObserver(entries => {
      for (let entry of entries) {
        const { width, height } = entry.contentRect;
        console.log(width, height);
        const scale = Math.min(width / TARGET_W, height / TARGET_H);
        child.style.width = (TARGET_W * scale) + 'px';
        child.style.height = (TARGET_H * scale) + 'px';
      }
    });
    ro.observe(container);
  </script>
</body>
</html>
